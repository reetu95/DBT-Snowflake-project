version: 2

models:
  - name: silver_bookings
    description: Cleaned booking records with calculated total booking amount.
    columns:
      - name: BOOKING_ID
        data_tests:
          - not_null
          - unique
      - name: LISTING_ID
        data_tests:
          - not_null

  - name: silver_listings
    description: Cleaned listing records with price category tags.
    columns:
      - name: LISTING_ID
        data_tests:
          - not_null
          - unique
      - name: HOST_ID
        data_tests:
          - not_null

  - name: silver_hosts
    description: Cleaned host records with response rate quality labels.
    columns:
      - name: HOST_ID
        data_tests:
          - not_null
          - unique
